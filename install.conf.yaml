- shell:
  - [git submodule update --init --recursive, Update submodules]

- link:
    
    ~/.ipython/profile_default/ipython_config.py:
      create: true
      path: ipython/profile_default/ipython_config.py

    ~/.config/nushell/:
      create: true
      path: nushell/*
      glob: true

    ~/.dagster/dagster.yaml:
      create: true
      path: dagster/dagster.yaml
